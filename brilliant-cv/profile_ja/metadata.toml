#:schema https://raw.githubusercontent.com/yunanwg/brilliant-CV/main/metadata.toml.schema.json

# Profile: Japanese. CJK-friendly settings with Noto Sans CJK JP fonts.
header_quote = "即戦力として活躍できる経験豊富なデータアナリスト"
cv_footer = "履歴書"
letter_footer = "カバーレター"

[layout]
    awesome_color = "skyblue"
    before_section_skip = "1pt"
    before_entry_skip = "1pt"
    before_entry_description_skip = "1pt"
    paper_size = "a4"
    date_width = "3.8cm"

    [layout.fonts]
        regular_fonts = ["Noto Sans", "Noto Sans CJK JP"]
        header_font = "Noto Sans CJK JP"

    [layout.header]
        header_align = "left"
        display_profile_photo = true
        profile_photo_radius = "50%"
        info_font_size = "10pt"

    [layout.entry]
        display_entry_society_first = true
        display_logo = true

    [layout.section]
        title_highlight = "full"

    [layout.footer]
        display_page_counter = false
        display_footer = true


[inject]
    injected_keywords_list = ["データアナリスト", "GCP", "Python", "SQL", "Tableau"]

[personal]
    first_name = "John"
    last_name = "Doe"
    # display_name overrides the Latin "first (light) + last (bold)" split
    # with a single CJK string in the first-name light style.
    display_name = "王道爾"

    [personal.info]
        github = "yunanwg"
        phone = "+86 138 0000 0000"
        email = "john.doe@me.org"
        linkedin = "johndoe"
        gitlab = "yunanwg"
        homepage = "johndoe.dev"
        orcid = "0000-0000-0000-0000"
        location = "東京"

        [personal.info.custom-degree]
            awesomeIcon = "graduation-cap"
            text = "データサイエンス博士"
            link = "https://www.example.com"

        [personal.info.custom-cert]
            awesomeIcon = "certificate"
            text = "AWS Certified"
            link = "https://aws.amazon.com/certification/"
